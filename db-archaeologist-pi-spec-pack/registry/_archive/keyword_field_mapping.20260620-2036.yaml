# 6 个 P0 关键词接口的字段映射。
# response_root 来自 ApiAssetCard.response_schema.root（已通过 grep 验证）。
# field_path 是去掉 root prefix 后的相对路径。
# priority 越大优先级越高，多源合并按 priority 倒序遍历，第一个非空字段即"决胜源"。
# request_template 列出必填参数 + tertiary_category / category_id 注入位置。
# category_lookup_api: 用于 auto-resolve 未命中 taxonomy 时的类目查找（可选，缺省则禁用 auto-resolve）。
version: 1
category_lookup_api: data_keywords_category_list
keyword_metric_record_keys:
  identity: [keyword, category]
  metrics:
    - search_popularity
    - search_index
    - search_value
    - search_growth_rate
    - search_popularity_mom
    - search_popularity_yoy
    - click_rate
    - pay_rate
    - pay_buyers
    - demand_supply_ratio
    - conversion_rate
    - tmall_click_share
    - search_visitors
    - relation_strength

apis:
  agent_sycm_keyword:
    priority: 100
    method: POST
    path: /agent/sycm_keyword
    response_root: data.result[]
    keyword_field: keywords
    request_template:
      tertiary_category: "{tertiary_category}"
    field_map:
      search_popularity: search_popularity
      click_rate: click_rate
      pay_rate: pay_rate
      search_growth_rate: search_growth_rate
    notes: "覆盖 search_popularity + click_rate + pay_rate + search_growth_rate，关键词总入口。"

  data_blue_keyword_7d_v2:
    priority: 90
    method: POST
    path: /data/blue_keyword_7d_v2
    response_root: data.result[]
    keyword_field: keywords
    request_template:
      body:
        tertiary_category: "{tertiary_category}"
        business_date: "{start_date}"
        start_date: "{start_date}"
        end_date: "{end_date}"
        search_popularity: "0"
        limit_num: "200"
        keyword_a: null
    field_map:
      search_popularity: search_popularity
      search_popularity_mom: search_popularity_mom
      click_rate: click_rate
      pay_rate: pay_rate
      pay_rate_mom: pay_rate_mom
      pay_buyers: pay_buyers
      pay_buyers_mom: pay_buyers_mom
      pay_buyers_yoy: pay_buyers_yoy
      demand_supply_ratio: demand_supply_ratio
      tmall_click_share: tmall_click_share
      relation_strength: relation_strength
    notes: "近 7 天蓝海词，覆盖 demand_supply_ratio + pay_buyers + relation_strength。"

  agent_blue_ocean_keywords_analysis:
    priority: 80
    method: POST
    path: /agent/blue_ocean_keywords_analysis
    response_root: data.result[]
    keyword_field: keywords
    request_template:
      tertiary_category: "{tertiary_category}"
      requirement_prop: "0"
      search_value: "0"
      search_popularity: "0"
      start_date: "{start_date}"
      end_date: "{end_date}"
    field_map:
      search_popularity: search_popularity
      search_popularity_mom: search_popularity_mom
      search_popularity_yoy: search_popularity_yoy
      click_rate: click_rate
      pay_rate: pay_rate
      pay_buyers: pay_buyers
      pay_buyers_mom: pay_buyers_mom
      pay_buyers_yoy: pay_buyers_yoy
      demand_supply_ratio: demand_supply_ratio
      tmall_click_share: tmall_click_share
    notes: "昨日蓝海关键词，搜索人气月环比/年同比覆盖最齐。"

  data_ads_industry_keywords_summary_m:
    priority: 70
    method: GET
    path: /data/ads_industry_keywords_summary_m
    response_root: data.result[]
    keyword_field: keywords
    request_template:
      business_date: "{start_date}"
      start_date: "{start_date}"
      end_date: "{end_date}"
      category_id: "{category_id}"
      has_demand_supply_ratio: "1"
    field_map:
      search_popularity: search_popularity
      click_rate: click_rate
      pay_rate: pay_rate
      pay_buyers: pay_buyers_count
      demand_supply_ratio: demand_supply_ratio
    notes: "月度行业关键词；只接受 category_id（不是 tertiary_category）。"

  data_ads_industry_keywords_7d:
    priority: 60
    method: POST
    path: /data/ads_industry_keywords_7d
    response_root: data
    keyword_field: keywords
    request_template:
      query:
        userId: "{user_id}"
        tenantId: "{tenant_id}"
      body:
        start_date: "{start_date}"
        end_date: "{end_date}"
        category_id: "{category_id}"
        pageNum: "1"
        pageSize: "200"
    field_map:
      search_popularity_mom: search_popularity_mom
      search_popularity_yoy: search_popularity_yoy
      click_rate: click_rate
      click_rate_mom: click_rate_mom
      click_rate_yoy: click_rate_yoy
      pay_buyers_mom: pay_buyers_mom
      pay_buyers_yoy: pay_buyers_yoy
    notes: "近 7 天行业关键词，response_root=data 单对象数组，提供 yoy 增速主源。"

  data_keyword_trend:
    priority: 50
    method: POST
    path: /data/keyword/trend
    response_root: data.result[]
    keyword_field: keywords
    request_template:
      start_date: "{start_date}"
      end_date: "{end_date}"
      tertiary_category: "{tertiary_category}"
    field_map:
      search_value: search_value
      search_value_trend: search_value_trend
      demand_supply_ratio: requirement_prop
    notes: "类目词根趋势；提供 search_value 和 trend，用于 trend_slope 子项。"

merge_order_priority:
  - agent_sycm_keyword
  - data_blue_keyword_7d_v2
  - agent_blue_ocean_keywords_analysis
  - data_ads_industry_keywords_summary_m
  - data_ads_industry_keywords_7d
  - data_keyword_trend