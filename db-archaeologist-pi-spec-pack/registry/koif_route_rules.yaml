# KOIF Route Rules
# Phase 2: 基于 KDS + TMS 的 3 条路由规则
# 完整规范见 docs/15_KOIF_ROUTER_SPEC.md §5

old_product_optimization:
  cn_name: 老品优化
  priority: 1
  conditions:
    - "kds >= 70"
  actions:
    - title_rewrite
  reason_template: |
    需求强度 KDS={kds:.1f}，已超过老品优化阈值 70。
    建议优先在现有商品标题中强化高 KDS 关键词的覆盖。

trend_test:
  cn_name: 趋势测试
  priority: 2
  conditions:
    - "tms >= 75"
    - "kds >= 60"
  actions:
    - content_topic
    - paid_candidate
  reason_template: |
    趋势强度 TMS={tms:.1f}（≥75）且需求强度 KDS={kds:.1f}（≥60）。
    可同时启动内容种草测试与付费投放候选词筛选。

content_candidate:
  cn_name: 内容候选
  priority: 3
  conditions:
    - "kds >= 70"
    - "tms >= 70"
  actions:
    - content_topic
  reason_template: |
    需求强度 KDS={kds:.1f} 与趋势强度 TMS={tms:.1f} 双高。
    可围绕该实体打造高质量内容种草。

